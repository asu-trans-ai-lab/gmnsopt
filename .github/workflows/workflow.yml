# PyPI Trusted Publishing (OIDC) for the `gmnsopt` package.
# Configured on PyPI as: owner=asu-trans-ai-lab, repo=gmnsopt, workflow=workflow.yml, environment=pypi.
# The package lives in ./release_github (that is where pyproject.toml is), so we build from there.
name: publish

on:
  release:
    types: [published]      # create a GitHub Release to publish that version to PyPI
  workflow_dispatch: {}     # allow manual trigger

jobs:
  build-and-publish:
    name: Build sdist+wheel and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi        # matches the PyPI "Environment name"
    permissions:
      id-token: write        # REQUIRED for OIDC trusted publishing (no API token needed)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        working-directory: release_github
        run: |
          python -m pip install --upgrade build
          python -m build          # -> release_github/dist/*.tar.gz, *.whl
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release_github/dist/
